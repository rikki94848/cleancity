<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>CleanCity</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <style>
      body {
        background: linear-gradient(135deg, #e0f7fa, #f1f8e9);
      }

      #map {
        height: 300px;
        border-radius: 10px;
        margin-bottom: 15px;
      }

      .card {
        border-radius: 15px;
        transition: 0.3s;
        cursor: pointer;
      }

      .card:hover {
        transform: translateY(-5px);
      }

      .card-img-top {
        height: 200px;
        object-fit: cover;
      }
    </style>
  </head>

  <body>
    <div class="container py-5">
      <h2 class="text-center mb-4">🌍 CleanCity</h2>

      <!-- FORM -->
      <div class="card p-4 shadow mb-5">
        <form id="formLaporan">
          <input type="hidden" name="lat" id="lat" />
          <input type="hidden" name="lng" id="lng" />

          <div class="mb-3">
            <input
              type="text"
              name="judul"
              class="form-control"
              placeholder="Judul"
              required
            />
          </div>

          <div class="mb-3">
            <textarea
              name="deskripsi"
              class="form-control"
              placeholder="Deskripsi"
            ></textarea>
          </div>

          <div class="mb-3">
            <input
              type="text"
              name="lokasi"
              class="form-control"
              placeholder="Alamat"
            />
          </div>

          <div id="map"></div>

          <div class="mb-3">
            <input type="file" name="foto" class="form-control" required />
          </div>

          <button class="btn btn-success w-100">🚀 Kirim</button>
        </form>
      </div>

      <!-- LIST -->
      <div id="listLaporan" class="row"></div>
    </div>

    <!-- MODAL -->
    <div class="modal fade" id="detailModal">
      <div class="modal-dialog modal-lg">
        <div class="modal-content">
          <div class="modal-header">
            <h5 id="modalTitle"></h5>
            <button class="btn-close" data-bs-dismiss="modal"></button>
          </div>

          <div class="modal-body">
            <img id="modalImage" class="img-fluid mb-3" />

            <a id="downloadBtn" class="btn btn-primary mb-3" download>
              Download
            </a>

            <p id="modalDesc"></p>
            <p id="modalLokasi"></p>

            <div id="modalMap" style="height: 300px"></div>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
      const map = L.map("map").setView([-6.9, 107.6], 13);

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(
        map,
      );

      let marker;

      map.on("click", (e) => {
        const { lat, lng } = e.latlng;
        document.getElementById("lat").value = lat;
        document.getElementById("lng").value = lng;

        if (marker) marker.setLatLng(e.latlng);
        else marker = L.marker(e.latlng).addTo(map);
      });

      const form = document.getElementById("formLaporan");
      const list = document.getElementById("listLaporan");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const formData = new FormData(form);

        const res = await fetch("/api/laporan", {
          method: "POST",
          body: formData,
        });

        alert(await res.text());
        form.reset();
        loadData();
      });

      async function loadData() {
        const res = await fetch("/api/laporan");
        const data = await res.json();

        list.innerHTML = "";

        data.forEach((item) => {
          list.innerHTML += `
      <div class="col-md-4 mb-4">
        <div class="card" onclick='openDetail(${JSON.stringify(item)})'>
          <img src="${item.foto_url}" class="card-img-top">
          <div class="card-body">
            <h5>${item.judul}</h5>
            <p>${item.deskripsi || "-"}</p>
          </div>
        </div>
      </div>
    `;
        });
      }

      function openDetail(item) {
        document.getElementById("modalTitle").innerText = item.judul;
        document.getElementById("modalDesc").innerText = item.deskripsi || "-";
        document.getElementById("modalLokasi").innerText =
          "📍 " + (item.lokasi || "-");

        document.getElementById("modalImage").src = item.foto_url;
        document.getElementById("downloadBtn").href = item.foto_url;

        new bootstrap.Modal(document.getElementById("detailModal")).show();

        setTimeout(() => {
          document.getElementById("modalMap").innerHTML = "";

          if (item.lat && item.lng) {
            const map = L.map("modalMap").setView([item.lat, item.lng], 15);

            L.tileLayer(
              "https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",
            ).addTo(map);

            L.marker([item.lat, item.lng]).addTo(map);
          }
        }, 300);
      }

      loadData();
    </script>
  </body>
</html>
