<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <title>CleanCity - Lapor Sampah</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Leaflet CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />

    <style>
      body {
        background: linear-gradient(135deg, #e0f7fa, #f1f8e9);
      }

      #map {
        height: 300px;
        border-radius: 10px;
        margin-bottom: 15px;
      }

      .card {
        border-radius: 15px;
        transition: 0.3s;
      }

      .card:hover {
        transform: translateY(-5px);
      }

      .card-img-top {
        height: 200px;
        object-fit: cover;
      }
    </style>
  </head>

  <body>
    <div class="container py-5">
      <h2 class="text-center mb-4">🌍 CleanCity</h2>

      <!-- FORM -->
      <div class="card p-4 shadow mb-5">
        <form id="formLaporan">
          <input type="hidden" name="lat" id="lat" />
          <input type="hidden" name="lng" id="lng" />

          <div class="mb-3">
            <label>Judul</label>
            <input type="text" name="judul" class="form-control" required />
          </div>

          <div class="mb-3">
            <label>Deskripsi</label>
            <textarea name="deskripsi" class="form-control"></textarea>
          </div>

          <div class="mb-3">
            <label>Alamat (opsional)</label>
            <input type="text" name="lokasi" class="form-control" />
          </div>

          <label class="mb-2">📍 Pilih lokasi di peta</label>
          <div id="map"></div>

          <div class="mb-3">
            <label>Foto</label>
            <input type="file" name="foto" class="form-control" required />
          </div>

          <button class="btn btn-success w-100">🚀 Kirim</button>
        </form>
      </div>

      <!-- LIST -->
      <h4>📋 Laporan</h4>
      <div id="listLaporan" class="row"></div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
      const map = L.map("map").setView([-6.9, 107.6], 13); // Bandung

      L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        attribution: "© OpenStreetMap",
      }).addTo(map);

      let marker;

      map.on("click", function (e) {
        const { lat, lng } = e.latlng;

        document.getElementById("lat").value = lat;
        document.getElementById("lng").value = lng;

        if (marker) {
          marker.setLatLng(e.latlng);
        } else {
          marker = L.marker(e.latlng).addTo(map);
        }
      });

      // SUBMIT
      const form = document.getElementById("formLaporan");
      const list = document.getElementById("listLaporan");

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const formData = new FormData(form);

        const res = await fetch("/api/laporan", {
          method: "POST",
          body: formData,
        });

        alert(await res.text());
        form.reset();
        loadData();
      });

      // LOAD DATA
      async function loadData() {
        const res = await fetch("/api/laporan");
        const data = await res.json();

        list.innerHTML = "";

        data.forEach((item) => {
          list.innerHTML += `
            <div class="col-md-4 mb-4">
              <div class="card">
                ${
                  item.foto_url
                    ? `<img src="${item.foto_url}" class="card-img-top">`
                    : ""
                }
                <div class="card-body">
                  <h5>${item.judul}</h5>
                  <p>${item.deskripsi || "-"}</p>
                  <small>📍 ${item.lokasi || "-"}</small><br>
                  ${
                    item.lat ? `<small>🌐 ${item.lat}, ${item.lng}</small>` : ""
                  }
                </div>
              </div>
            </div>
          `;
        });
      }

      loadData();
    </script>
  </body>
</html>
